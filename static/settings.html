<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정 - AI 쇼츠 자동 제작</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container" style="max-width: 520px;">
            <div class="login-header">
                <h1>API 키 설정</h1>
                <p>각 서비스에서 발급받은 API 키를 입력하세요</p>
            </div>

            <div id="auth-error" class="auth-error hidden"></div>
            <div id="auth-success" class="auth-success hidden"></div>

            <div class="auth-panel">
                <form id="api-keys-form" onsubmit="handleSaveKeys(event)">

                    <!-- Gemini -->
                    <div class="form-group">
                        <label for="gemini-key">
                            Gemini API 키
                            <span class="key-badge required">필수</span>
                            <span class="key-status" id="gemini-status"></span>
                        </label>
                        <div class="key-input-row">
                            <input type="password" id="gemini-key" placeholder="AIza...로 시작하는 키">
                            <button type="button" class="btn-toggle-eye" onclick="toggleKeyVisibility('gemini-key')">보기</button>
                        </div>
                        <p class="key-desc">제목, 나레이션, 이미지 생성에 사용됩니다</p>
                        <a href="https://aistudio.google.com/apikey" target="_blank" class="key-link">Google AI Studio에서 발급</a>
                    </div>

                    <!-- Typecast -->
                    <div class="form-group">
                        <label for="typecast-key">
                            Typecast API 키
                            <span class="key-badge optional">선택</span>
                            <span class="key-status" id="typecast-status"></span>
                        </label>
                        <div class="key-input-row">
                            <input type="password" id="typecast-key" placeholder="Typecast API 키">
                            <button type="button" class="btn-toggle-eye" onclick="toggleKeyVisibility('typecast-key')">보기</button>
                        </div>
                        <p class="key-desc">Typecast 음성을 사용할 때만 필요 (Edge-TTS는 키 불필요)</p>
                        <a href="https://typecast.ai/developers/api" target="_blank" class="key-link">Typecast에서 발급</a>
                    </div>

                    <!-- FAL -->
                    <div class="form-group">
                        <label for="fal-key">
                            FAL API 키
                            <span class="key-badge optional">선택</span>
                            <span class="key-status" id="fal-status"></span>
                        </label>
                        <div class="key-input-row">
                            <input type="password" id="fal-key" placeholder="FAL API 키">
                            <button type="button" class="btn-toggle-eye" onclick="toggleKeyVisibility('fal-key')">보기</button>
                        </div>
                        <p class="key-desc">AI 영상 모드(Hailuo, Wan 등)를 사용할 때만 필요 (Ken Burns는 키 불필요)</p>
                        <a href="https://fal.ai/dashboard/keys" target="_blank" class="key-link">FAL에서 발급</a>
                    </div>

                    <button type="submit" class="btn-primary btn-full" id="btn-save">저장</button>
                </form>

                <p class="key-note">빈 칸으로 저장하면 기존 키가 삭제됩니다</p>
            </div>

            <div class="auth-links">
                <a href="/">메인으로 돌아가기</a>
            </div>
        </div>
    </div>

    <style>
        .key-input-row { display: flex; gap: 8px; }
        .key-input-row input { flex: 1; }
        .btn-toggle-eye {
            background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
            border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; white-space: nowrap;
        }
        .btn-toggle-eye:hover { border-color: var(--primary); color: var(--text); }
        .key-badge {
            font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: normal;
        }
        .key-badge.required { background: rgba(255,71,87,0.15); color: var(--error); }
        .key-badge.optional { background: rgba(136,136,136,0.15); color: var(--text-dim); }
        .key-status { font-size: 12px; margin-left: 8px; }
        .key-status.set { color: var(--success); }
        .key-status.unset { color: var(--text-dim); }
        .key-desc { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
        .key-link { color: var(--primary); font-size: 12px; text-decoration: none; }
        .key-link:hover { text-decoration: underline; }
        .key-note { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 12px; }
    </style>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/settings.js"></script>
</body>
</html>
