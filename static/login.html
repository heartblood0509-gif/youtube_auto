<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Shorts Pick</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link rel="stylesheet" href="/static/css/login.css?v=6">
</head>
<body>
    <script>if(localStorage.getItem('theme')==='dark'||!localStorage.getItem('theme'))document.body.classList.add('dark');</script>
    <div class="login-wrapper">
        <div class="login-container">

            <div id="auth-error" class="auth-error hidden"></div>

            <div class="auth-panel login-card">
                <div class="login-logo">
                    <span class="login-logo-emoji">🎬</span>
                    <span class="login-logo-text">Shorts Pick</span>
                </div>
                <p class="login-subtitle">동영상 콘텐츠 자동 생성 도구</p>

                <div class="social-login">
                    <button class="btn-social btn-google" onclick="loginGoogle()">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google로 로그인
                    </button>
                </div>
                <p class="approval-notice">로그인 후 관리자 승인이 필요합니다</p>
            </div>

            <!-- 관리자 비상 로그인 -->
            <div class="auth-links" style="margin-top: 24px;">
                <a href="#" id="admin-login-toggle" onclick="toggleAdminLogin(event)">관리자 로그인</a>
            </div>
            <div id="admin-login-section" class="auth-panel hidden" style="margin-top: 12px;">
                <form onsubmit="handleAdminLogin(event)">
                    <div class="form-group">
                        <label for="admin-email">이메일</label>
                        <input type="email" id="admin-email" placeholder="관리자 이메일" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-password">비밀번호</label>
                        <div class="pw-wrapper">
                            <input type="password" id="admin-password" placeholder="비밀번호" required>
                            <button type="button" class="pw-toggle" onclick="togglePw(this)">
                                <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-full">관리자 로그인</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    function loginGoogle() {
        window.location.href = '/api/auth/google/login';
    }

    function toggleAdminLogin(e) {
        e.preventDefault();
        document.getElementById('admin-login-section').classList.toggle('hidden');
    }

    function togglePw(btn) {
        const input = btn.parentElement.querySelector('input');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.querySelector('.eye-open').style.display = isHidden ? 'none' : '';
        btn.querySelector('.eye-closed').style.display = isHidden ? '' : 'none';
    }

    async function handleAdminLogin(e) {
        e.preventDefault();
        const errorEl = document.getElementById('auth-error');
        errorEl.classList.add('hidden');

        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;

        try {
            const resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
                credentials: 'same-origin',
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || '로그인 실패');
            window.location.href = '/';
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.classList.remove('hidden');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const errorEl = document.getElementById('auth-error');
        if (error === 'google_failed') {
            errorEl.textContent = 'Google 로그인에 실패했습니다';
            errorEl.classList.remove('hidden');
        } else if (error === 'no_email') {
            errorEl.textContent = '이메일 정보를 가져올 수 없습니다';
            errorEl.classList.remove('hidden');
        } else if (error === 'invalid_state') {
            errorEl.textContent = '로그인 세션이 만료되었습니다. 다시 시도해주세요.';
            errorEl.classList.remove('hidden');
        }

        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            document.getElementById('admin-email').value = 'cospick2019@gmail.com';
            document.getElementById('admin-password').value = 'cos0601!';
        }
    });
    </script>
</body>
</html>
