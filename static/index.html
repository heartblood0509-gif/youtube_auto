<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Pick</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
</head>
<body class="has-navbar">
    <script>if(localStorage.getItem('theme')==='dark'||!localStorage.getItem('theme'))document.body.classList.add('dark');</script>
    <nav class="navbar">
        <a href="/" class="navbar-logo">
            <span class="navbar-logo-emoji">🎬</span>
            <span class="navbar-logo-text">Shorts Pick</span>
        </a>
        <div id="navbar-right" class="navbar-right"></div>
    </nav>

    <div class="container" style="padding-top: 20px;">

        <!-- 타임라인 -->
        <nav id="workflow-timeline" class="timeline">
            <ol class="timeline-track">
                <li class="timeline-item active" data-step="0" onclick="clickTimelineStep(0)">
                    <span class="timeline-dot"></span>
                    <span class="timeline-label">주제</span>
                </li>
                <li class="timeline-item" data-step="1" onclick="clickTimelineStep(1)">
                    <span class="timeline-dot"></span>
                    <span class="timeline-label">제목</span>
                </li>
                <li class="timeline-item" data-step="2" onclick="clickTimelineStep(2)">
                    <span class="timeline-dot"></span>
                    <span class="timeline-label">나레이션</span>
                </li>
                <li class="timeline-item" data-step="3" onclick="clickTimelineStep(3)">
                    <span class="timeline-dot"></span>
                    <span class="timeline-label">음성</span>
                </li>
                <li class="timeline-item" data-step="4" onclick="clickTimelineStep(4)">
                    <span class="timeline-dot"></span>
                    <span class="timeline-label">BGM</span>
                </li>
                <li class="timeline-item" data-step="5" onclick="clickTimelineStep(5)">
                    <span class="timeline-dot"></span>
                    <span class="timeline-label">확인</span>
                </li>
            </ol>
        </nav>

        <!-- Step 1: 주제 설정 -->
        <section id="step-input" class="card step-section" data-step-index="0">
            <div class="step-body">
                <h2>1. 주제 설정</h2>

                <div class="form-group">
                    <label for="category">카테고리</label>
                    <select id="category" onchange="toggleCategoryFields()">
                        <option value="cosmetics">화장품</option>
                        <option value="general">일반</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="topic">주제</label>
                    <input type="text" id="topic" placeholder="예: 여름철 모공 관리 팁" maxlength="200">
                </div>

                <!-- 화장품 카테고리 전용 필드 -->
                <div id="cosmetics-fields">
                    <div class="form-group">
                        <label for="pain-point">타겟 고민 / 페인포인트</label>
                        <input type="text" id="pain-point" placeholder="예: 모공 넓어짐, 칙칙한 피부톤" maxlength="100">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ingredient">핵심 성분 (선택)</label>
                            <input type="text" id="ingredient" placeholder="예: 나이아신아마이드" maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="mention-type">제품 언급 방식</label>
                            <select id="mention-type" onchange="toggleProductName()">
                                <option value="comment">댓글 유도</option>
                                <option value="direct">직접 언급</option>
                            </select>
                        </div>
                    </div>
                    <div id="product-name-field" class="form-group" style="display:none;">
                        <label for="product-name">제품명</label>
                        <input type="text" id="product-name" placeholder="예: 닥터자르트 시카페어 크림" maxlength="100">
                    </div>
                </div>

                <button id="btn-generate" class="btn-primary" onclick="generateTitles()">
                    제목 생성하기
                </button>
            </div>
        </section>

        <!-- Step 2: 제목 선택 -->
        <section id="step-titles" class="card hidden step-section" data-step-index="1">
            <div class="step-body">
                <h2>2. 제목 선택</h2>
                <p class="subtitle">마음에 드는 제목을 클릭하세요</p>
                <div id="title-options"></div>
                <div id="title-split-editor" class="hidden">
                    <label>영상에 표시될 제목 (2줄)</label>
                    <div class="title-split-layout">
                        <div class="title-preview-frame" id="title-preview-frame">
                            <div class="title-preview-line1" id="preview-line1"></div>
                            <div class="title-preview-line2" id="preview-line2"></div>
                            <div class="title-preview-image-area"></div>
                            <div class="title-overflow-warn">제목이 화면을 넘어갑니다</div>
                        </div>
                        <div class="title-split-inputs">
                            <div class="form-group">
                                <label>윗줄</label>
                                <input type="text" id="title-line1" maxlength="16" oninput="onTitleLineEdited()">
                            </div>
                            <div class="form-group">
                                <label>아랫줄</label>
                                <input type="text" id="title-line2" maxlength="16" oninput="onTitleLineEdited()">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="generateTitles()">다시 생성</button>
                    <button id="btn-next-title" class="btn-primary" onclick="confirmTitle()" disabled>다음: 나레이션 생성</button>
                </div>
            </div>
        </section>

        <!-- Step 3: 나레이션 확인 -->
        <section id="step-narration" class="card hidden step-section" data-step-index="2">
            <div class="step-body">
                <h2>3. 나레이션 확인</h2>
                <div class="form-group">
                    <label>선택된 제목</label>
                    <div id="selected-title-display" class="title-readonly"></div>
                </div>
                <div id="narration-lines"></div>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="regenerateNarration()">다시 생성</button>
                    <button class="btn-primary" onclick="approveNarration()">나레이션 확정</button>
                </div>
            </div>
        </section>

        <!-- Step 4: TTS 설정 -->
        <section id="step-tts" class="card hidden step-section" data-step-index="3">
            <div class="step-body">
                <h2>4. 음성 설정</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tts-engine">TTS 엔진</label>
                        <select id="tts-engine">
                            <option value="typecast">Typecast (고품질)</option>
                            <option value="edge">Edge TTS (무료)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tts-voice">음성 선택</label>
                        <div class="voice-select-row">
                            <select id="tts-voice"></select>
                            <button type="button" id="voice-preview-btn" title="미리듣기">▶</button>
                        </div>
                    </div>
                </div>

                <div id="emotion-section" class="form-group hidden">
                    <label>감정/톤</label>
                    <div id="emotion-buttons" class="emotion-btn-group">
                        <p class="text-dim">성우를 선택하면 감정 목록이 표시됩니다.</p>
                    </div>
                    <input type="hidden" id="tts-emotion" value="normal">
                </div>

                <div class="form-group">
                    <label for="tts-speed">TTS 속도: <span id="speed-val">1.0</span>배</label>
                    <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.1" value="1.0">
                    <div class="range-ticks">
                        <span style="position:absolute;left:0%">0.5배</span>
                        <span style="position:absolute;left:33.3%">1배</span>
                        <span style="position:absolute;left:66.7%">1.5배</span>
                        <span style="position:absolute;right:0">2배</span>
                    </div>
                </div>

                <button class="btn-primary" onclick="confirmTtsSettings()">다음: BGM 설정</button>
            </div>
        </section>

        <!-- Step 5: BGM 설정 -->
        <section id="step-bgm" class="card hidden step-section" data-step-index="4">
            <div class="step-body">
                <h2>5. BGM 설정</h2>

                <div class="form-group">
                    <label>BGM 선택</label>
                    <div class="bgm-upload-area">
                        <input type="file" id="bgm-upload-input" accept=".mp3,.wav,.ogg" hidden>
                        <button class="btn-secondary btn-small" onclick="document.getElementById('bgm-upload-input').click()" id="bgm-upload-btn">+ BGM 업로드</button>
                        <a href="https://studio.youtube.com/channel/UCLKxh4mqBNJH0mmDYw1jEZg/music" target="_blank" class="btn-secondary btn-small">YouTube 오디오 보관함</a>
                        <span class="text-dim" style="font-size:12px">MP3, WAV, OGG (최대 20MB)</span>
                    </div>
                    <div id="bgm-list" class="bgm-grid">
                        <p class="text-dim">BGM 목록 로딩 중...</p>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bgm-volume">BGM 볼륨: <span id="bgm-val">12</span>%</label>
                        <input type="range" id="bgm-volume" min="0" max="50" step="1" value="12">
                    </div>

                    <div id="bgm-start-section" class="form-group hidden">
                        <label>BGM 시작 지점: <span id="bgm-start-val">0:00</span></label>
                        <input type="range" id="bgm-start" min="0" max="100" step="0.1" value="0">
                        <div class="bgm-start-input-row">
                            <input type="number" id="bgm-start-sec" min="0" step="0.1" value="0" class="bgm-time-input">
                            <span class="text-dim">초</span>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" onclick="confirmBgmSettings()">다음: 최종 확인</button>
            </div>
        </section>

        <!-- Step 6: 최종 확인 -->
        <section id="step-confirm" class="card hidden step-section" data-step-index="5">
            <div class="step-body">
                <h2>6. 최종 확인</h2>

                <div id="confirm-summary"></div>
                <button class="btn-primary" onclick="createJob()">이미지 생성 시작</button>
            </div>
        </section>

    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
