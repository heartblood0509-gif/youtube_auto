<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - AI 쇼츠 자동 제작</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h1>비밀번호 재설정</h1>
                <p>새로운 비밀번호를 입력해주세요</p>
            </div>

            <div id="auth-error" class="auth-error hidden"></div>
            <div id="auth-success" class="auth-success hidden"></div>

            <div id="reset-form-section" class="auth-panel">
                <form id="reset-form" onsubmit="handleResetConfirm(event)">
                    <div class="form-group">
                        <label for="new-password">새 비밀번호</label>
                        <div class="pw-wrapper">
                            <input type="password" id="new-password" placeholder="8자 이상" required minlength="8">
                            <button type="button" class="pw-toggle" onclick="togglePw(this)">
                                <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="new-password-confirm">새 비밀번호 확인</label>
                        <div class="pw-wrapper">
                            <input type="password" id="new-password-confirm" placeholder="비밀번호를 다시 입력하세요" required>
                            <button type="button" class="pw-toggle" onclick="togglePw(this)">
                                <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-full">비밀번호 변경</button>
                </form>
            </div>

            <div class="auth-links">
                <a href="/static/login.html">로그인 페이지로 돌아가기</a>
            </div>
        </div>
    </div>

    <script>
        function togglePw(btn) {
            const input = btn.parentElement.querySelector('input');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.querySelector('.eye-open').style.display = isHidden ? 'none' : '';
            btn.querySelector('.eye-closed').style.display = isHidden ? '' : 'none';
        }

        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.getElementById('reset-form-section').innerHTML =
                '<p style="text-align:center;color:var(--error)">유효하지 않은 링크입니다.</p>';
        }

        async function handleResetConfirm(e) {
            e.preventDefault();
            const pw = document.getElementById('new-password').value;
            const pwConfirm = document.getElementById('new-password-confirm').value;
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');

            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            if (pw !== pwConfirm) {
                errorEl.textContent = '비밀번호가 일치하지 않습니다';
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const resp = await fetch('/api/auth/password-reset/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: pw }),
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '오류가 발생했습니다');

                successEl.textContent = '비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다.';
                successEl.classList.remove('hidden');
                document.getElementById('reset-form-section').classList.add('hidden');
                setTimeout(() => { window.location.href = '/static/login.html'; }, 2000);
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
