<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미리보기 - Shorts Pick</title>
    <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>
<body class="has-navbar">
    <script>if(localStorage.getItem('theme')==='dark'||!localStorage.getItem('theme'))document.body.classList.add('dark');</script>
    <nav class="navbar">
        <a href="/" class="navbar-logo">
            <span class="navbar-logo-emoji">🎬</span>
            <span class="navbar-logo-text">Shorts Pick</span>
        </a>
        <div id="navbar-right" class="navbar-right"></div>
    </nav>

    <div class="container" style="padding-top: 20px;">
        <h2 class="page-title">이미지 미리보기</h2>
        <p class="subtitle" id="preview-title" style="text-align:center; margin-bottom:16px;"></p>

        <div id="preview-grid" class="preview-grid"></div>

        <div class="card" style="margin-top: 1.5rem;">
            <h2 style="margin-bottom: 0.8rem;">영상 모드 선택</h2>
            <div class="style-card-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="style-card selected" data-value="kenburns" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #475569, #94a3b8)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">이미지 슬라이드</span>
                    </div>
                    <span class="style-card-name">무료</span>
                </div>
                <div class="style-card" data-value="hailuo" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #7c3aed, #2563eb)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">Hailuo 02</span>
                    </div>
                    <span class="style-card-name">512P · 약 150원</span>
                </div>
                <!-- 아래 3개는 UI에서 숨김 (나중에 다시 추가 가능) -->
                <div class="style-card hidden" data-value="hailuo23" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #6d28d9, #4f46e5)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">Hailuo 2.3</span>
                    </div>
                    <span class="style-card-name">768P · 약 285원</span>
                </div>
                <div class="style-card hidden" data-value="wan" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #059669, #10b981)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">Wan 2.1</span>
                    </div>
                    <span class="style-card-name">480P · 약 300원</span>
                </div>
                <div class="style-card hidden" data-value="kling26" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #e11d48, #fb923c)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">Kling 2.6</span>
                    </div>
                    <span class="style-card-name">1080P · 약 525원</span>
                </div>
                <div class="style-card" data-value="kling" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #dc2626, #f97316)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">Kling 2.1</span>
                    </div>
                    <span class="style-card-name">1080P · 약 420원</span>
                </div>
                <div class="style-card" data-value="veo" onclick="selectVideoMode(this)">
                    <div class="style-card-preview" style="background: linear-gradient(135deg, #1d4ed8, #06b6d4)">
                        <span class="style-card-icon" style="font-size: 1.2rem;">Veo 3.1</span>
                    </div>
                    <span class="style-card-name">1080P · 약 750원</span>
                </div>
            </div>
        </div>

        <div class="btn-group center" style="margin-bottom: 60px;">
            <a href="/" class="btn-secondary">처음으로</a>
            <button id="btn-confirm" class="btn-primary" onclick="confirmAndRender()">
                영상 제작 시작
            </button>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/preview.js"></script>
</body>
</html>
